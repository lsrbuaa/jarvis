<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Jarvis</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="app">
        <header class="appbar">
            <button class="icon-btn" id="menuButton" aria-label="菜单">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>
            </button>
            <div class="brand-block">
                <div class="app-title">Jarvis</div>
                <div class="app-subtitle" id="statusLine">OPC 办公助手</div>
            </div>
            <button class="icon-btn" id="sensorButton" aria-label="传感器">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 0 1 16 0"></path><path d="M7 12a5 5 0 0 1 10 0"></path><path d="M12 12l3-3"></path><path d="M12 12h.01"></path><path d="M5 20h14"></path></svg>
            </button>
        </header>

        <main id="content" class="content"></main>

        <button class="composer" id="composerButton">
            <span class="composer-badge">J</span>
            <span>交给 Jarvis 处理...</span>
            <span class="composer-action">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4Z"></path></svg>
            </span>
        </button>

        <nav class="bottom-nav" id="bottomNav"></nav>
    </div>

    <div id="modalHost"></div>
    <script src="app.js"></script>
</body>
</html>
